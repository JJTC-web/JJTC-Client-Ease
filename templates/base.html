<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Survey{% endblock %}</title>
<style>
  :root {
    --primary: #5B3FA0;
    --primary-dark: #402c73;
    --accent: #F2A93B;
    --bg: #F7F5FB;
    --card: #FFFFFF;
    --text: #2C2C2C;
    --muted: #6b6b6b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }
  .card {
    background: var(--card);
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    padding: 36px;
    max-width: 520px;
    width: 100%;
  }
  h1 {
    font-size: 1.6rem;
    color: var(--primary-dark);
    margin-top: 0;
  }
  p.subtitle {
    color: var(--muted);
    margin-top: -8px;
    margin-bottom: 28px;
  }
  label {
    display: block;
    font-weight: 600;
    margin-top: 20px;
    margin-bottom: 8px;
  }
  input[type="text"], textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 1rem;
    font-family: inherit;
  }
  textarea { resize: vertical; min-height: 70px; }
  .scale {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .scale label {
    margin: 0;
    font-weight: 400;
    flex: 1;
    text-align: center;
    background: #f0edf7;
    border-radius: 8px;
    padding: 10px 4px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.15s ease;
    min-width: 40px;
  }
  .scale input[type="radio"] {
    display: none;
  }
  .scale input[type="radio"]:checked + label,
  .scale label:has(input:checked) {
    background: var(--primary);
    color: white;
    border-color: var(--primary-dark);
  }
  .scale-caption {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 4px;
  }
  button {
    margin-top: 28px;
    width: 100%;
    background: var(--primary);
    color: white;
    border: none;
    padding: 14px;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  button:hover { background: var(--primary-dark); }
  a { color: var(--primary); }
  .nav {
    max-width: 520px;
    width: 100%;
  }
  ul.link-list {
    list-style: none;
    padding: 0;
  }
  ul.link-list li {
    margin: 14px 0;
  }
  ul.link-list a {
    display: block;
    background: var(--primary);
    color: white;
    text-decoration: none;
    padding: 16px;
    border-radius: 10px;
    text-align: center;
    font-weight: 600;
  }
  ul.link-list a:hover { background: var(--primary-dark); }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  th, td {
    text-align: left;
    padding: 6px 8px;
    border-bottom: 1px solid #eee;
  }
</style>
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>
